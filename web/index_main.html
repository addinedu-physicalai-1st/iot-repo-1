<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 음성 체질 분석 보안 스마트홈 플랫폼</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1E3C72,#2A5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#app{
width:900px;
background:rgba(0,0,0,0.5);
border-radius:28px;
padding:40px;
text-align:center;
}

h2{
color:#ffd54f;
font-size:3em;
}

#avatar{
width:170px;
height:170px;
background:#ffd54f;
border-radius:50%;
margin:auto;
position:relative;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.eye{
width:24px;
height:24px;
background:black;
border-radius:50%;
position:absolute;
top:45px;
}

.eye.left{ left:45px; }
.eye.right{ right:45px; }

.cheek{
width:20px;
height:14px;
background:#ff8a80;
border-radius:50%;
position:absolute;
top:80px;
}

.cheek.left{ left:25px; }
.cheek.right{ right:25px; }

.mouth{
width:55px;
height:20px;
background:black;
border-radius:20px;
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
transition:0.2s;
}

.talking{
height:42px;
}

.box{
background:rgba(255,255,255,0.15);
border-radius:18px;
padding:20px;
margin-top:16px;
}

button{
width:23%;
margin:10px 1%;
padding:16px;
border-radius:16px;
border:none;
background:#ffca28;
font-weight:bold;
}

#chart{
margin-top:30px;
background:rgba(255,255,255,0.1);
border-radius:16px;
padding:10px;
}

.manual-input-wrap{
display:flex;
gap:10px;
align-items:center;
margin-top:16px;
}
.manual-input{
flex:1;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
border-radius:14px;
padding:14px 18px;
color:#fff;
font-size:1rem;
outline:none;
}
.manual-input::placeholder{ color:rgba(255,255,255,0.5); }
.manual-input:focus{ border-color:#ffca28; }
.send-btn{
width:auto;
padding:14px 24px;
background:#ffca28;
color:#1a1a1a;
font-weight:bold;
cursor:pointer;
border-radius:14px;
border:none;
}
.send-btn:hover{ background:#ffd54f; }

.avatar-row{
position:relative;
display:flex;
align-items:center;
justify-content:center;
min-height:170px;
width:100%;
margin-top:16px;
}
#avatar{ margin:0; }
.dashboard-btn{
position:absolute;
right:0;
top:50%;
transform:translateY(-50%);
white-space:nowrap;
margin:0;
padding:14px 20px;
font-size:1rem;
background:#4CAF50;
color:#fff;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}
.dashboard-btn:hover{ background:#66BB6A; }
</style>
</head>

<body>

<div id="app">

<h2>AI 음성 체질 분석 보안 스마트홈 플랫폼</h2>

<div class="avatar-row">
<div id="avatar">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="cheek left"></div>
<div class="cheek right"></div>
<div class="mouth" id="mouth"></div>
</div>
<button class="dashboard-btn" onclick="window.location.href='/dashboard'">📊 대시보드로 이동</button>
</div>

<div class="box" id="userText">자비스야라고 부르세요</div>
<div class="box" id="analysisResult">AI 분석 대기</div>

<div class="manual-input-wrap">
<input class="manual-input" id="manualInput" placeholder="수동 명령 입력 (예: 침실 불 켜줘)" />
<button class="send-btn" id="sendBtn">전송 ▶</button>
</div>

<canvas id="chart"></canvas>

</div>

<iframe id="musicPlayer"
width="0"
height="0"
src=""
frameborder="0"
allow="autoplay">
</iframe>

<script>

/* 아바타 */
const mouth = document.getElementById("mouth");
function avatarTalk(on){
if(on) mouth.classList.add("talking");
else mouth.classList.remove("talking");
}

/* AI 음성 */
let voice;

function loadVoices(){
const voices = speechSynthesis.getVoices();
voice =
voices.find(v=>v.name.includes("Google 한국어")) ||
voices.find(v=>v.lang==="ko-KR") ||
voices[0];
}
speechSynthesis.onvoiceschanged = loadVoices;

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.voice = voice;
u.rate = 0.95;
u.pitch = 1.05;
avatarTalk(true);
speechSynthesis.speak(u);
u.onend = ()=>avatarTalk(false);
}

/* 음악 */
function playMusic(){
document.getElementById("musicPlayer").src =
"https://www.youtube.com/embed/pW6OoeiPozA?autoplay=1";
speak("음악을 들려드리겠습니다");
}

function stopMusic(){
document.getElementById("musicPlayer").src="";
speak("음악을 끄겠습니다");
}

/* 차트 */
const ctx=document.getElementById("chart").getContext("2d");
const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{label:"스트레스",data:[],borderColor:"red"},
{label:"허스키",data:[],borderColor:"cyan"}
]
}
});

/* ── WebSocket (대시보드와 동일: VAD, 로컬 STT, 로컬 ExaOne) ── */
const WS_URL = "ws://" + location.host + "/ws";
let ws = null;
let wsRetryTimer = null;

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = function() {
    console.log("WebSocket 연결됨");
    clearTimeout(wsRetryTimer);
  };
  ws.onclose = function() {
    console.log("WebSocket 끊김 - 3초 후 재연결");
    wsRetryTimer = setTimeout(connectWS, 3000);
  };
  ws.onerror = function() { console.warn("WebSocket 오류"); };
  ws.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      handleServerMsg(data);
    } catch (err) { console.error("WS 파싱 오류:", err); }
  };
}

function sendWS(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function handleServerMsg(data) {
  const type = data.type;
  if (type === "wake_detected") {
    document.getElementById("userText").innerText = "명령을 말씀하세요...";
    avatarTalk(true);
  } else if (type === "wake_timeout") {
    avatarTalk(false);
    document.getElementById("userText").innerText = "자비스야라고 부르세요";
  } else if (type === "stt_result") {
    const text = (data.text || "").trim();
    if (!text) return;
    avatarTalk(false);
    document.getElementById("userText").innerText = text;
    onVoiceTextResult(text);
  } else if (type === "cmd_result") {
    const msg = data.msg || "";
    const isOk = data.status === "ok";
    document.getElementById("analysisResult").innerText =
      (isOk ? "✅ " : "❌ ") + msg;
  }
}

/* 서버 STT 활성화 (VAD + 로컬 Whisper STT + ExaOne 파이프라인) */
async function activateServerSTT() {
  sendWS({ type: "manual_trigger" });
  try {
    const res = await fetch("/stt/activate", { method: "POST" });
    if (res.ok) console.log("서버 STT 활성화 (VAD/로컬 STT)");
  } catch (e) { /* WS만으로도 동작 */ }
}

/* ESP32 설정 - 여기에 ESP32의 IP 주소를 입력하세요 */
const ESP32_IP = "192.168.0.6"; // ESP32의 실제 IP 주소로 변경 필요

/* ESP32 제어 함수 */
async function controlESP32(endpoint){
try{
const url = `http://${ESP32_IP}${endpoint}`;
const res = await fetch(url, {method:"GET"});
return await res.json();
}catch(error){
console.error("ESP32 연결 실패:", error);
return null;
}
}

/* AI 분석 요청 */
async function callAI(endpoint){
try{
const res=await fetch(endpoint,{method:"POST"});
return await res.json();
}catch{
return null;
}
}

/* 웨이크 워드 "자비스야" 시 서버가 STT 결과를 보냄. 페이지 로드 시 WS 연결 */
window.addEventListener("load", function() {
  connectWS();
});

/* 수동 입력 전송 (대시보드와 동일: voice_text → 서버 LLM → cmd_result) */
function sendManualCommand() {
  const input = document.getElementById("manualInput");
  const text = (input && input.value || "").trim();
  if (!text) return;
  connectWS();
  sendWS({ type: "voice_text", text: text });
  input.value = "";
  document.getElementById("userText").innerText = "⌨ " + text;
}
document.getElementById("sendBtn").onclick = sendManualCommand;
document.getElementById("manualInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendManualCommand();
});

/* 서버 stt_result 수신 시 처리 (웨이크 워드 "자비스야" 이후 인식된 말) */
async function onVoiceTextResult(text) {
  /* AI 요청 */
  const voiceAuth = await callAI("http://localhost:5000/voice_auth");
  const emotion = await callAI("http://localhost:5000/emotion");
  const constitution = await callAI("http://localhost:5000/constitution");

  const stress = Math.random() * 5;
  const husky = Math.random() * 5;

  document.getElementById("analysisResult").innerText =
    "감정:" + (emotion?.emotion || "분석중") + " | 인증:" + (voiceAuth ? "성공" : "로컬") + " ";

  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(stress);
  chart.data.datasets[1].data.push(husky);
  if (chart.data.labels.length > 10) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }
  chart.update();

  handleCommand(text);
}

/* 스마트홈 명령 */
async function handleCommand(text){

if(text.includes("음악 들려") || text.includes("음악 틀어")){
playMusic();
return;
}

if(text.includes("음악 꺼")){
stopMusic();
return;
}

if(text.includes("불 켜") || text.includes("불켜") || text.includes("전등 켜")){
const result = await controlESP32("/led/on");
if(result){
speak("불을 켜겠습니다");
}else{
speak("ESP32 연결에 실패했습니다");
}
return;
}

if(text.includes("불 꺼") || text.includes("불꺼") || text.includes("전등 꺼")){
const result = await controlESP32("/led/off");
if(result){
speak("불을 끄겠습니다");
}else{
speak("ESP32 연결에 실패했습니다");
}
return;
}

if(text.includes("문 열") || text.includes("문열")){
const result = await controlESP32("/door/open");
if(result){
speak("문을 열겠습니다");
}else{
speak("ESP32 연결에 실패했습니다");
}
return;
}

if(text.includes("문 닫") || text.includes("문닫")){
const result = await controlESP32("/door/close");
if(result){
speak("문을 닫겠습니다");
}else{
speak("ESP32 연결에 실패했습니다");
}
return;
}

if(text.includes("온도")){
const result = await controlESP32("/temperature");
if(result){
speak("온도를 조절하겠습니다");
}else{
speak("ESP32 연결에 실패했습니다");
}
return;
}

}

/* 눈 깜빡임 */
setInterval(()=>{
document.querySelectorAll(".eye").forEach(e=>{
e.style.height=Math.random()<0.2?"6px":"24px";
});
},700);

</script>
</body>
</html>
