; PlatformIO Project Configuration
; esp_cam_entrance — ESP32-CAM 현관 보안 카메라 (UDP JPEG 스트리밍)
;
; 빌드:   pio run
; 업로드:  pio run --target upload
; 모니터:  pio device monitor

