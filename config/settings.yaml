# ================================================================
# Voice IoT Controller - Settings  v1.2
# ================================================================
# 수정일: 2026-03-04
# v1.2 변경: SmartGate liveness espcam 프로파일 v3.1 파라미터 추가
#            blink_ear_thresh, nod_threshold, mouth_mar_thresh,
#            mouth_consec_frames, upscale_to, debug_log,
#            mesh_detect_conf, mesh_track_conf 추가
#
# v1.1 변경: SmartGate 2FA 서브패키지 설정 추가 (smartgate 섹션)
#            얼굴인식 + Liveness + 제스처 2FA 인증
#            프로파일 기반 전환 (laptop / espcam)
#
# v1.0 변경: TTS provider kokoro → edge (Microsoft Edge TTS)
#            한국어 목소리 ko-KR-SunHiNeural 적용
#            tts.edge 블록 추가
# v0.9 변경: tts.kokoro.voice af_heart → af_sarah
#            lang en → en-us (espeak 호환)
#            (voices.bin 영어 전용 버전 — af_heart 미포함 확인)
# v0.8 변경: tts 블록 추가 (Kokoro 로컬 / ElevenLabs API)
# v0.7 변경: STT model_size base → small (인식률 향상)
#            STT beam_size 1 → 3
#            STT cpu_threads 3 → 6
#            LLM qwen2.5:1.5b → qwen2.5:7b
#            LLM timeout 10 → 30
# v0.6 변경: _KO_CORRECTIONS 한국어 오인식 교정 추가 (stt_engine)
#            llm_engine _normalize_types 추가 (pin float→int)
# v0.5 변경: mic_device 10 → 11 (pipewire, 검증 결과 기반)
#            noise_reduction / noise_prop_decrease 추가
# v0.4 변경: whisper 섹션 → stt 섹션으로 통합
#            Porcupine 웨이크 워드 설정 추가

server:
  host: "0.0.0.0"
  tcp_port: 9000
  ws_port: 8000
  ws_path: "/ws"

ollama:
  host: "http://localhost:11434"
  model: "exaone3.5:latest"
  timeout: 30

# ================================================================
# TTS 설정
# ================================================================
tts:
  # 사용할 TTS provider 선택
  # "edge"        → Microsoft Edge TTS, 무료, 한국어 지원 ← 현재 사용
  # "kokoro"      → 로컬 ONNX 추론, 무료, 한국어 미지원
  # "elevenlabs"  → API 호출, 고품질, 유료
  provider: "edge"

  edge:
    # 한국어 목소리
    # ko-KR-SunHiNeural  ← 여성 (기본값)
    # ko-KR-InJoonNeural ← 남성
    voice: "ko-KR-SunHiNeural"
    edge_rate: "+0%"      # 발화 속도: "+10%" 빠르게 / "-10%" 느리게
    edge_volume: "+0%"    # 볼륨

  kokoro:
    model_path:  "models/kokoro-v0_19.onnx"
    voices_path: "models/voices.bin"
    voice: "af_sarah"
    speed: 1.0
    lang: "en-us"

  elevenlabs:
    api_key: ""       # .env ELEVENLABS_API_KEY 로 주입 (settings.yaml에 평문 기재 금지)
    voice_id: ""      # .env ELEVENLABS_VOICE_ID 로 주입
    model_id: "eleven_multilingual_v2"

# ================================================================
# STT 설정
# ================================================================
stt:
  model_size: "base"
  language: "ko"
  device: "cpu"
  wake_word: "자비스야"
  # wake_source: "browser" → 웨이크워드 브라우저 마이크 | "server" → 서버 마이크 (자비스야 미작동 시 server로 변경)
  wake_source: "server"
  porcupine_access_key: ""   # .env PORCUPINE_ACCESS_KEY 사용
  porcupine_model_path: "models/자비스야_ko_linux_v4_0_0.ppn"
  porcupine_params_path: "models/porcupine_params_ko.pv"
  # mic_device 미설정 시 시스템 기본 마이크 사용 (sounddevice default)
  vad_energy_threshold: 0.02
  noise_reduction: false
  noise_prop_decrease: 0.85
  debug_mode: true

# ================================================================
# ESP32 디바이스 배치
# ================================================================
devices:

  esp32_garage:
    label: "차고"
    caps: ["led", "servo"]
    pins:
      led:
        - id: "led_garage_main"
          gpio: 2
          label: "차고 메인 조명"
      servo:
        - id: "servo_garage_door"
          gpio: 18
          label: "차고 문"
          default_angle: 0

  esp32_bathroom:
    label: "욕실"
    caps: ["led", "temp"]
    pins:
      led:
        - id: "led_bathroom_main"
          gpio: 2
          label: "욕실 조명"
      sensor:
        - id: "temp_bathroom"
          gpio: 15
          type: "ds18b20"
          label: "욕실 온도 센서"
          interval_sec: 30

  esp32_bedroom:
    label: "침실"
    caps: ["led", "dht22", "seg7", "servo"]
    pins:
      led:
        - id: "led_bedroom_main"
          gpio: 2
          label: "침실 조명"
      sensor:
        - id: "dht22_bedroom"
          gpio: 15
          type: "dht22"
          label: "침실 온습도 센서"
          interval_sec: 10
      seg7:
        - id: "seg7_bedroom"
          pin_clk: 22
          pin_dio: 23
          label: "침실 7세그먼트 (온도/습도 표시)"
          default_mode: "temp"
      servo:
        - id: "servo_bedroom"
          gpio: 18
          label: "침실 서보모터"
          default_angle: 0

  esp32_entrance:
    label: "현관"
    caps: ["led", "servo"]
    pins:
      led:
        - id: "led_entrance_main"
          gpio: 2
          label: "현관 조명"
      servo:
        - id: "servo_entrance_door"
          gpio: 18
          label: "현관 문"
          default_angle: 0

# ================================================================
# ESP32-CAM / Camera 설정
# ================================================================
camera:
  udp_port: 5005          # ESP32-CAM이 보내는 UDP 포트 (esp32_cam.ino SERVER_PORT와 동일)
  multipart: true         # 항상 멀티파트 모드 사용 (MAGIC 헤더 + 조각 전송)
  analyze_every: 10       # 매 N 프레임마다 분석 (키우면 CPU·지연↓, 예: 20)
  # v2.2: UDP IP 화이트리스트 (MEDIUM-5 보안 조치)
  # 비인가 IP 패킷 차단 — ESP32-CAM IP 변경 시 이 목록만 수정 후 서버 재시작
  # 복수 카메라 추가 시 아래 주석 해제
  allowed_ips:
    - "192.168.0.19"      # ESP32-CAM #1 (현관)
    # - "192.168.0.xx"    # ESP32-CAM #2 (추가 시 주석 해제)
  # 하이브리드 재전송: frame_id 손실률 기반 적응형 품질 (camera_stream.py 상수)
  # loss_threshold: 0.15 → quality_down, loss_recovery: 0.05 → quality_up

# ================================================================
# LLM 명령 → device_id 매핑 키워드
# v3: esp32_home1 (침실서보/욕실seg7·DHT11) + esp32_home2 (LED5개/차고·현관서보/PIR)
# ================================================================
command_keywords:
  # LED 명령 → esp32_home2 (5개 LED 모두 home2에 있음)
  # 서보 명령: 침실 커튼 → esp32_home1, 차고/현관 → esp32_home2
  # _resolve_device() 에서 cmd+room 기반으로 자동 라우팅
  # 이 키워드는 명시적 device_id 없이 room만 전달될 때 사용됨 (구버전 호환)
  차고:   "esp32_home2"
  차고문:  "esp32_home2"
  욕실:   "esp32_home1"
  화장실:  "esp32_home1"
  침실:   "esp32_home1"
  방:     "esp32_home1"
  현관:   "esp32_home2"
  현관문:  "esp32_home2"
  거실:   "esp32_home2"

seg7_mode_keywords:
  온도:  "temp"
  습도:  "humidity"
  끄기:  "off"

# ================================================================
# Database 설정 (SR-3.1: 장기 로그 관리 / SR-3.2: 검색/조회)
# ================================================================
database:
  enabled: true             # false 시 DB 로깅 비활성화 (기존 동작 유지)
  host: "localhost"
  port: 3306
  user: ""              # .env DB_USER 로 주입 (settings.yaml에 평문 기재 금지)
  password: ""          # .env DB_PASSWORD 로 주입 (settings.yaml에 평문 기재 금지)
  db: "iot_smart_home"
  pool_size: 5              # aiomysql 커넥션 풀 크기
  pool_recycle: 3600        # 커넥션 재활용 주기 (초)

# ================================================================
# SmartGate 2-Factor Authentication (v0.9)
# ================================================================
# 비활성화: DISABLE_SMARTGATE=1 ./run_server.sh
# 또는 smartgate.enabled: false
# ================================================================
smartgate:
  enabled: true
  face_db_dir: "face_db"
  gate_device_id: "esp32_entrance"
  open_duration_sec: 5

  face_auth:
    model_name: "buffalo_sc"
    tolerance: 0.40
    min_face_size: 80

  liveness:
    active_profile: "espcam"   # ← ESP-CAM 연결 시 "espcam" / 노트북 테스트 시 "laptop"
    enabled: true
    profiles:
      laptop:
        challenges_pool: ["blink", "yaw", "nod", "mouth_open"]
        num_challenges: 2
        random_order: true
        timeout_sec: 8.0
        blink_ear_thresh: 0.22
        blink_consec_frames: 2
        yaw_threshold: 0.15
        nod_threshold: 0.08
        mouth_mar_thresh: 0.45
        mouth_consec_frames: 2
      espcam:
        # v1.2: liveness v3.1 ESP-CAM 최적화 파라미터 전체 반영
        challenges_pool: ["yaw"]
        num_challenges: 1
        random_order: true
        timeout_sec: 12.0               # v1.2: 20→12 (VGA 업그레이드 반영, 적정 대기)
        blink_ear_thresh: 0.25           # v1.2: 추가 (저해상도 EAR 노이즈 보상)
        blink_consec_frames: 1
        yaw_threshold: 0.10              # v1.2: 0.12→0.10 (작은 움직임도 감지)
        nod_threshold: 0.06              # v1.2: 추가 (풀 확장 대비)
        mouth_mar_thresh: 0.35           # v1.2: 추가 (풀 확장 대비)
        mouth_consec_frames: 1           # v1.2: 추가
        upscale_to: 640                  # v1.2: 추가 (짧은변 기준 업스케일, 0=비활성)
        debug_log: true                  # v1.2: 추가 (EAR/yaw/pitch/MAR 실측값 로그)
        mesh_detect_conf: 0.4            # v1.2: 추가 (Face Mesh detection confidence)
        mesh_track_conf: 0.4             # v1.2: 추가 (Face Mesh tracking confidence)

  gesture_auth:
    mode: "number"
    sequence: []         # .env SMARTGATE_SEQUENCE 로 주입 (예: "1,0,3")
    timeout_sec: 7.0
    hold_frames: 8
    cooldown_sec: 1.5

  security:
    max_failures: 3
    lockout_sec: 5
