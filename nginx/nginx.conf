# ================================================================
# Voice IoT Controller - nginx 역방향 프록시 (HTTPS)
# ================================================================
# 원격 접속 시 브라우저 마이크(getUserMedia) 사용을 위해 HTTPS 필요
#
# 사용법:
#   1. ./scripts/ssl_generate_cert.sh  # 자체 서명 인증서 생성
#   2. ./scripts/run_nginx.sh
# ================================================================

worker_processes auto;
events { worker_connections 1024; }

http {
    # 업스트림 (백엔드)
    upstream iot_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # HTTPS (0.0.0.0 = 모든 인터페이스에서 수신, 원격 접속 허용)
    server {
        listen 0.0.0.0:443 ssl;
        listen [::]:443 ssl;
        server_name _;

    # SSL 인증서 (자체 서명 또는 Let's Encrypt)
    ssl_certificate     ssl/iot.pem;
    ssl_certificate_key ssl/iot-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 로그
    access_log logs/access.log;
    error_log  logs/error.log;

    # 최대 업로드 (오디오 전송용)
    client_max_body_size 10M;

    # 정적 파일 (선택: nginx에서 직접 서빙 가능)
    location / {
        proxy_pass http://iot_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 업그레이드
    location /ws {
        proxy_pass http://iot_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
    }
}
